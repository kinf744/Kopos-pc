name: Build Kopos-pc (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore NuGet packages
        run: dotnet restore KighmuVpnWindows.csproj

      - name: Download native binaries (bin/win/)
        shell: bash
        run: |
          mkdir -p bin/win

          # xray.exe (depuis release v1.0.0 Kopos-pc)
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/octet-stream" \
               -o bin/win/xray.exe \
               "https://api.github.com/repos/kinf744/Kopos-pc/releases/assets/451788798"

          # dnstt-client.exe (depuis release v1.0.0 Kopos-pc)
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/octet-stream" \
               -o bin/win/dnstt-client.exe \
               "https://api.github.com/repos/kinf744/Kopos-pc/releases/assets/451678327"

          # hysteria.exe (depuis release v1.0.0 Kopos-pc)
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/octet-stream" \
               -o bin/win/hysteria.exe \
               "https://api.github.com/repos/kinf744/Kopos-pc/releases/assets/451681521"

          # tun2socks.exe (source officielle)
          curl -L -o bin/win/tun2socks.exe \
               "https://github.com/xjasonlyu/tun2socks/releases/latest/download/tun2socks-windows-amd64.exe"

          # wintun.dll (driver TUN Windows)
          curl -L -o wintun.zip "https://www.wintun.net/builds/wintun-0.14.1.zip"
          unzip -o wintun.zip "wintun/bin/amd64/wintun.dll" -d wintun_tmp/
          mv wintun_tmp/wintun/bin/amd64/wintun.dll bin/win/wintun.dll
          rm -rf wintun.zip wintun_tmp/

          echo "=== Contenu bin/win/ ==="
          ls -lh bin/win/

      - name: Build (Release)
        run: dotnet publish KighmuVpnWindows.csproj -c Release -r win-x64 --self-contained false -o publish/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KighmuVPN-Windows
          path: publish/
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "KighmuVPN Windows — Build ${{ github.run_number }}"
          files: |
            publish/KighmuVPN.exe
          body: |
            Build automatique depuis le commit ${{ github.sha }}
            Mode: Release | Plateforme: Windows x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
