name: Build Kopos-pc (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore NuGet packages
        run: dotnet restore KighmuVpnWindows.csproj

      - name: Download native binaries (bin/win/)
        shell: bash
        run: |
          mkdir -p bin/win

          # xray.exe
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -o bin/win/xray.exe \
            "https://api.github.com/repos/kinf744/Kopos-pc/releases/assets/451788798"

          # dnstt-client.exe
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -o bin/win/dnstt-client.exe \
            "https://api.github.com/repos/kinf744/Kopos-pc/releases/assets/451678327"

          # hysteria.exe
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -o bin/win/hysteria.exe \
            "https://api.github.com/repos/kinf744/Kopos-pc/releases/assets/451681521"

          # hev-socks5-tunnel (tun2socks + wintun inclus)
          curl -L -o hev_win64.zip \
            "https://github.com/heiher/hev-socks5-tunnel/releases/download/2.15.0/hev-socks5-tunnel-win64.zip"
          unzip -o hev_win64.zip -d hev_tmp/
          mv hev_tmp/hev-socks5-tunnel/hev-socks5-tunnel.exe bin/win/tun2socks.exe
          mv hev_tmp/hev-socks5-tunnel/wintun.dll            bin/win/wintun.dll
          mv hev_tmp/hev-socks5-tunnel/msys-2.0.dll          bin/win/msys-2.0.dll
          rm -rf hev_win64.zip hev_tmp/

          echo "=== Contenu bin/win/ ==="
          ls -lh bin/win/

      - name: Build (Release)
        run: dotnet publish KighmuVpnWindows.csproj -c Release -o publish/

      - name: Creer ZIP de distribution
        shell: pwsh
        run: |
          echo "=== Contenu publish/ ==="
          Get-ChildItem publish/ | Select-Object Name, Length | Sort-Object Length -Descending
          Compress-Archive -Path publish\* -DestinationPath KighmuVPN-Windows.zip -Force
          $zip = Get-Item KighmuVPN-Windows.zip
          Write-Host ("ZIP final: {0} Mo" -f [math]::Round($zip.Length/1MB, 2))

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KighmuVPN-Windows
          path: KighmuVPN-Windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "KighmuVPN Windows — Build ${{ github.run_number }}"
          files: |
            KighmuVPN-Windows.zip
          body: |
            Build automatique depuis le commit ${{ github.sha }}
            Compatible: Windows 7 SP1 x64 et Windows 10/11
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
